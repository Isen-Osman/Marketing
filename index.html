<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетинг - Студиски Материјали</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }

        .root {
            max-width: 720px;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            background: #dbeafe;
            color: #1d4ed8;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 2.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
        }

        .card:hover {
            border-color: #94a3b8;
            background: #f8fafc;
            transform: translateY(-2px);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .blue  { background: #dbeafe; color: #1d4ed8; }
        .teal  { background: #d1fae5; color: #065f46; }
        .amber { background: #fef3c7; color: #92400e; }
        .coral { background: #ffe4e6; color: #9f1239; }
        .purple{ background: #ede9fe; color: #5b21b6; }

        .card-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        .card-title {
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
            line-height: 1.4;
        }

        .card-arrow {
            margin-top: auto;
            font-size: 16px;
            color: #cbd5e1;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 2rem 0;
        }

        footer {
            font-size: 13px;
            color: #94a3b8;
            margin-top: auto;
        }
    </style>
</head>
<body>
<div class="root">
    <header>
        <div class="badge">
            <i class="ti ti-school"></i>
            Студиски материјали
        </div>
        <h1>Маркетинг студии</h1>
        <p class="subtitle">Централен индекс на сите предавања и водичи</p>
    </header>

    <main class="grid">
        <a href="study_guide.html" class="card">
            <div class="card-icon blue"><i class="ti ti-books"></i></div>
            <div>
                <div class="card-label">Главен водич</div>
                <div class="card-title">Стратегии на цени</div>
            </div>
            <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </a>

        <a href="Poglavje_17_Studiranje.html" class="card">
            <div class="card-icon teal"><i class="ti ti-book-2"></i></div>
            <div>
                <div class="card-label">Поглавје</div>
                <div class="card-title">Директен и Интернет маркетинг</div>
            </div>
            <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </a>

        <a href="Marketing_Kanali_Studiranje.html" class="card">
            <div class="card-icon amber"><i class="ti ti-route"></i></div>
            <div>
                <div class="card-label">Дистрибуција</div>
                <div class="card-title">Маркетинг канали</div>
            </div>
            <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </a>

        <a href="Reklamiranje_i_PR_Studiranje.html" class="card">
            <div class="card-icon coral"><i class="ti ti-speakerphone"></i></div>
            <div>
                <div class="card-label">Комуникација</div>
                <div class="card-title">Рекламирање и PR</div>
            </div>
            <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </a>

        <a href="Lichna_prodazba_Studiranje.html" class="card">
            <div class="card-icon purple"><i class="ti ti-users"></i></div>
            <div>
                <div class="card-label">Продажба</div>
                <div class="card-title">Лична продажба</div>
            </div>
            <div class="card-arrow"><i class="ti ti-arrow-right"></i></div>
        </a>
    </main>

    <div class="divider"></div>
    <footer>&copy; 2026 Маркетинг студии</footer>
</div>
</body>
</html>
